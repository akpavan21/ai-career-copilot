services:
  postgres:
    image: postgres:16
    container_name: career_copilot_postgres
    environment:
      POSTGRES_USER: career_user
      POSTGRES_PASSWORD: career_pass
      POSTGRES_DB: career_copilot
    ports:
      - "5432:5432"
    volumes:
      - career_copilot_pgdata:/var/lib/postgresql/data

volumes:
  career_copilot_pgdata:
